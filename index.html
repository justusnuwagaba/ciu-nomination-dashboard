<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIU Alumni Live Nominations 2026</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/en/0/0f/Cavendish_University_Uganda_logo.png" alt="CIU Logo" class="logo">

        <h1>CIU Alumni Association</h1>
        <h2>Leadership Nominations 2026</h2>

        <p class="subtitle">
            Live Transparency Dashboard
        </p>
    </header>

    <section class="stats">
        <div class="card">
            <h3>Total Nominations</h3>
            <p id="totalNominations">0</p>
        </div>

        <div class="card">
            <h3>Total Candidates</h3>
            <p id="totalCandidates">0</p>
        </div>

        <div class="card">
            <h3>Positions</h3>
            <p id="totalPositions">0</p>
        </div>
    </section>

    <section>
        <h2 class="section-title">Live Nomination Results</h2>

        <div id="dashboard"></div>
    </section>

    <footer>
        Last Updated Automatically • CIU Alumni Electoral Committee
    </footer>

    <script src="script.js"></script>
</body>
</html>
